<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FFFFFF"/>
  <title>Pedidos de Oração</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#F8F8FA;
      --white:#FFFFFF;
      --text:#1A1D26;
      --text2:#6E7280;
      --text3:#A0A5B2;
      --border:#EEEFF2;
      --sage:#6A7765;
      --navy:#3E495D;
      --gold:#E2AF67;
      --cream:#F4F0E7;
      --r:14px;
      --rr:50px;
    }

    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      padding-bottom:90px;
    }

    /* ── HEADER ── */
    .hdr{
      background:var(--white);
      padding:52px 20px 20px;
      border-bottom:1px solid var(--border);
    }
    .hdr-inner{max-width:600px;margin:0 auto}
    .hdr h1{
      font-size:28px;
      font-weight:800;
      color:var(--text);
      letter-spacing:-0.8px;
      text-align:center;
    }
    .hdr-sub{
      text-align:center;
      font-size:13px;
      color:var(--text3);
      font-weight:500;
      margin-top:2px;
    }

    /* Stats */
    .stats{
      display:flex;
      gap:8px;
      margin-top:18px;
      justify-content:center;
    }
    .st{
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 16px;
      border-radius:var(--rr);
      background:var(--bg);
      font-size:13px;
      font-weight:600;
    }
    .st .num{font-weight:800}
    .st-total .num{color:var(--navy)}
    .st-pend .num{color:var(--gold)}
    .st-done .num{color:var(--sage)}
    .st .lbl{color:var(--text2);font-weight:500}

    /* ── CONTAINER ── */
    .cnt{max-width:600px;margin:0 auto;padding:16px 16px 0}

    /* Search */
    .search-row{
      display:flex;
      gap:8px;
      margin-bottom:14px;
    }
    .search-box{
      flex:1;
      position:relative;
    }
    .search-box svg{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--text3);
    }
    .search-box input{
      width:100%;
      padding:12px 12px 12px 42px;
      border-radius:var(--r);
      border:1.5px solid var(--border);
      font-family:inherit;
      font-size:14px;
      color:var(--text);
      background:var(--white);
      outline:none;
      transition:border .2s;
    }
    .search-box input:focus{border-color:var(--navy)}
    .search-box input::placeholder{color:var(--text3)}

    .sort-btn{
      padding:12px 16px;
      border-radius:var(--r);
      border:1.5px solid var(--border);
      background:var(--white);
      font-family:inherit;
      font-size:13px;
      font-weight:600;
      color:var(--text);
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:4px;
      transition:all .2s;
      white-space:nowrap;
    }
    .sort-btn:hover{background:var(--bg)}

    /* Filter row */
    .filters{
      display:flex;
      gap:6px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .f-pill{
      padding:8px 16px;
      border-radius:var(--rr);
      border:1.5px solid var(--border);
      background:var(--white);
      font-family:inherit;
      font-size:12px;
      font-weight:600;
      color:var(--text2);
      cursor:pointer;
      transition:all .2s;
    }
    .f-pill.on{
      background:var(--text);
      border-color:var(--text);
      color:var(--white);
    }

    /* Categories */
    .cats{
      display:flex;
      gap:6px;
      overflow-x:auto;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
      padding-bottom:4px;
      margin-bottom:18px;
    }
    .cats::-webkit-scrollbar{display:none}
    .cat{
      padding:7px 14px;
      border-radius:var(--rr);
      border:1.5px solid var(--border);
      background:var(--white);
      font-family:inherit;
      font-size:11px;
      font-weight:600;
      color:var(--text2);
      cursor:pointer;
      transition:all .2s;
      white-space:nowrap;
      flex-shrink:0;
      display:flex;
      align-items:center;
      gap:5px;
    }
    .cat .ci{font-size:13px}
    .cat .cn{
      font-size:10px;
      font-weight:700;
      background:var(--bg);
      padding:1px 6px;
      border-radius:10px;
      color:var(--text3);
    }
    .cat.on{
      background:var(--navy);
      border-color:var(--navy);
      color:#fff;
    }
    .cat.on .cn{background:rgba(255,255,255,.2);color:#fff}

    /* Section label */
    .sec{
      display:none;
      align-items:center;
      gap:6px;
      margin-bottom:12px;
      padding-left:2px;
    }
    .sec.vis{display:flex}
    .sec h2{font-size:16px;font-weight:700;color:var(--text)}
    .sec .sc{font-size:12px;font-weight:500;color:var(--text3)}

    /* ── LIST ── */
    .list{display:flex;flex-direction:column;gap:0}

    .item{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 16px;
      background:var(--white);
      border-bottom:1px solid var(--border);
      cursor:pointer;
      transition:background .15s;
    }
    .item:first-child{border-radius:var(--r) var(--r) 0 0}
    .item:last-child{border-radius:0 0 var(--r) var(--r);border-bottom:none}
    .item:only-child{border-radius:var(--r)}
    .item:hover{background:#FAFAFE}
    .item.fin{background:#FAFDF8}

    /* Icon circle */
    .ic{
      width:42px;
      height:42px;
      min-width:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      background:var(--bg);
      border:1.5px solid var(--border);
      transition:all .2s;
    }
    .item.fin .ic{
      background:#EBF5E6;
      border-color:#D0E5C8;
    }

    .item-body{flex:1;min-width:0}
    .item-text{
      font-size:14px;
      font-weight:600;
      color:var(--text);
      line-height:1.4;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .item.fin .item-text{color:var(--text3);text-decoration:line-through}
    .item-cats{
      font-size:11px;
      font-weight:500;
      color:var(--text3);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Right side */
    .item-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }
    .chk{
      width:26px;height:26px;min-width:26px;
      border-radius:50%;
      border:2px solid var(--border);
      background:transparent;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;color:transparent;
      transition:all .2s;
      padding:0;
    }
    .chk.on{border-color:var(--sage);background:var(--sage);color:#fff}

    .dbtn{
      background:none;border:none;cursor:pointer;
      color:var(--text3);font-size:18px;padding:2px;
      border-radius:6px;transition:all .15s;
      line-height:1;opacity:0;
    }
    .item:hover .dbtn{opacity:1}
    .dbtn:hover{color:#D64545;background:#FDE8E8}

    /* Expanded detail */
    .item-detail{
      display:none;
      padding:14px 0 0;
      margin-top:14px;
      border-top:1px solid var(--border);
    }
    .item.open .item-detail{display:block}
    .item.open .item-text{
      -webkit-line-clamp:unset;
    }

    .dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .di{}
    .di.fw{grid-column:1/-1}
    .di-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:1px}
    .di-v{font-size:12px;font-weight:500;color:var(--text)}
    .di-v.em{color:var(--text3);font-style:italic;font-weight:400}
    .di-v.act{color:var(--gold);font-weight:700}
    .di-v.dn{color:var(--sage);font-weight:700}

    .badges-exp{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
    .bx{
      font-size:10px;font-weight:600;
      padding:3px 10px;border-radius:var(--rr);
      white-space:nowrap;
    }

    /* Empty */
    .empty{text-align:center;padding:48px 20px;color:var(--text3)}
    .empty .ei{font-size:36px;margin-bottom:10px}
    .empty p{font-size:14px;font-weight:500}

    /* ── FAB ── */
    .fab{
      position:fixed;
      bottom:28px;
      right:20px;
      width:56px;height:56px;
      border-radius:50%;
      background:var(--navy);
      color:#fff;
      border:none;
      font-size:28px;font-weight:300;
      cursor:pointer;
      box-shadow:0 4px 20px rgba(62,73,93,.3);
      z-index:200;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;line-height:1;
    }
    .fab:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(62,73,93,.35)}
    .fab:active{transform:scale(.94)}

    /* ── MODAL ── */
    .ov{
      display:none;position:fixed;inset:0;
      background:rgba(26,29,38,.35);
      backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      z-index:300;
      align-items:flex-end;justify-content:center;
    }
    .ov.open{display:flex}

    .modal{
      background:var(--white);
      border-radius:20px 20px 0 0;
      padding:6px 20px 34px;
      width:100%;max-width:520px;
      max-height:92vh;overflow-y:auto;
      animation:su .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

    .mh{width:36px;height:4px;border-radius:4px;background:var(--border);margin:8px auto 18px}
    .mt{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .mt h3{font-size:17px;font-weight:700;color:var(--text)}
    .mx{
      background:var(--bg);border:none;
      width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;color:var(--text2);cursor:pointer;
      transition:background .15s;
    }
    .mx:hover{background:var(--border)}

    .fg{margin-bottom:14px}
    .fg-l{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-bottom:5px}
    .fg-i,.fg-t{
      width:100%;padding:11px 14px;
      border-radius:10px;border:1.5px solid var(--border);
      font-family:inherit;font-size:13px;color:var(--text);
      background:var(--bg);outline:none;transition:border .2s;
    }
    .fg-i:focus,.fg-t:focus{border-color:var(--navy)}
    .fg-t{resize:vertical;min-height:76px;line-height:1.6}
    .fg-i::placeholder,.fg-t::placeholder{color:var(--text3)}
    .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    .cs{display:flex;flex-wrap:wrap;gap:5px}
    .cs-i{
      display:inline-flex;align-items:center;gap:3px;
      font-family:inherit;font-size:11px;font-weight:600;
      padding:6px 12px;border-radius:var(--rr);
      cursor:pointer;border:1.5px solid var(--border);
      background:var(--white);color:var(--text2);
      transition:all .2s;user-select:none;
    }
    .cs-i.sel{border-color:var(--navy);background:rgba(62,73,93,.08);color:var(--navy)}
    .cs-i input{display:none}

    .btn-go{
      width:100%;padding:14px;border-radius:var(--rr);border:none;
      background:var(--navy);color:#fff;
      font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;transition:all .2s;margin-top:6px;
    }
    .btn-go:hover{background:#333E50}

    /* Confirm */
    .cov{
      display:none;position:fixed;inset:0;
      background:rgba(26,29,38,.35);
      backdrop-filter:blur(4px);z-index:400;
      align-items:center;justify-content:center;
    }
    .cov.open{display:flex}
    .cbox{
      background:var(--white);border-radius:18px;
      padding:28px 24px 22px;width:90%;max-width:340px;
      text-align:center;
      animation:pp .2s cubic-bezier(.16,1,.3,1);
    }
    @keyframes pp{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
    .cbox p{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
    .cbox small{display:block;font-size:12px;color:var(--text3);font-style:italic;margin-bottom:20px;line-height:1.4}
    .ca{display:flex;gap:10px}
    .ca button{
      flex:1;padding:12px;border-radius:var(--rr);border:none;
      font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .ca-c{background:var(--bg);color:var(--text)}
    .ca-c:hover{background:var(--border)}
    .ca-d{background:#E74C3C;color:#fff}
    .ca-d:hover{background:#C0392B}

    /* Footer */
    .fv{
      margin-top:36px;text-align:center;
      color:#D0CEC8;font-size:12px;font-style:italic;
      line-height:1.7;padding:0 20px 20px;
    }
    .fv .ref{display:block;margin-top:3px;font-style:normal;font-weight:600;font-size:10px;color:#DDD9D0}

    @media(max-width:480px){
      .hdr{padding:44px 16px 16px}
      .hdr h1{font-size:24px}
      .item{padding:14px 14px;gap:12px}
      .ic{width:38px;height:38px;min-width:38px;font-size:16px}
      .item-text{font-size:13px}
      .fab{width:50px;height:50px;font-size:24px;bottom:20px;right:16px}
      .dg{grid-template-columns:1fr}
      .dbtn{opacity:1}
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <h1>Pedidos de Oração</h1>
    <div class="hdr-sub">Organizador de intercessão</div>
    <div class="stats">
      <div class="st st-total"><span class="num" id="sT">0</span><span class="lbl">pedidos</span></div>
      <div class="st st-pend"><span class="num" id="sP">0</span><span class="lbl">em oração</span></div>
      <div class="st st-done"><span class="num" id="sD">0</span><span class="lbl">finalizados</span></div>
    </div>
  </div>
</header>

<div class="cnt">
  <div class="search-row">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Buscar por nome ou palavra-chave..." id="sI"/>
    </div>
  </div>

  <div class="filters">
    <button class="f-pill on" data-f="all">Todos</button>
    <button class="f-pill" data-f="pending">Em oração</button>
    <button class="f-pill" data-f="done">Finalizados</button>
  </div>

  <div class="cats" id="cR"></div>
  <div class="sec" id="sH"><span class="ci"></span><h2></h2><span class="sc"></span></div>
  <div class="list" id="lE"></div>

  <div class="fv">
    "Não andem ansiosos por coisa alguma, mas em tudo, pela oração e súplicas, com ação de graças, apresentem seus pedidos a Deus."
    <span class="ref">Filipenses 4:6</span>
  </div>
</div>

<button class="fab" id="fab">+</button>

<!-- Add -->
<div class="ov" id="aO">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt"><h3>Novo pedido</h3><button class="mx" id="mX">✕</button></div>
    <form id="aF">
      <div class="fg">
        <label class="fg-l">Pedido *</label>
        <textarea class="fg-t" id="fT" placeholder="Descreva o pedido de oração..." required></textarea>
      </div>
      <div class="fg">
        <label class="fg-l">Categorias *</label>
        <div class="cs" id="fC"></div>
      </div>
      <div class="fg">
        <label class="fg-l">Data do pedido</label>
        <input class="fg-i" type="date" id="fD"/>
      </div>
      <div class="fg">
        <label class="fg-l">Nome (opcional)</label>
        <input class="fg-i" type="text" id="fN" placeholder="Nome da pessoa..."/>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label class="fg-l">Telefone</label>
          <input class="fg-i" type="tel" id="fP" placeholder="(00) 00000-0000"/>
        </div>
        <div class="fg">
          <label class="fg-l">E-mail</label>
          <input class="fg-i" type="email" id="fE" placeholder="email@exemplo.com"/>
        </div>
      </div>
      <button type="submit" class="btn-go">Adicionar pedido</button>
    </form>
  </div>
</div>

<!-- Confirm -->
<div class="cov" id="cO">
  <div class="cbox">
    <p>Excluir este pedido?</p>
    <small id="cPv"></small>
    <div class="ca">
      <button class="ca-c" id="cC">Cancelar</button>
      <button class="ca-d" id="cD">Excluir</button>
    </div>
  </div>
</div>

let D=[],ac="todos",sf="all",sq="",di=null;
function sv(){try{localStorage.setItem("pv5",JSON.stringify(D))}catch(e){}}
function ld(){try{const s=localStorage.getItem("pv5");if(s){D=JSON.parse(s);return}}catch(e){}D=JSON.parse(JSON.stringify(DF))}
ld();
function ni(){return D.length?Math.max(...D.map(r=>r.id))+1:1}
function fd(d){if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}
function cc(id){return id==="todos"?D.length:D.filter(r=>r.ct.includes(id)).length}

function render(){
  const tot=D.length,done=D.filter(r=>r.dn).length,pend=tot-done;
  document.getElementById("sT").textContent=tot;
  document.getElementById("sP").textContent=pend;
  document.getElementById("sD").textContent=done;

  // Cats
  document.getElementById("cR").innerHTML=C.map(c=>`<button class="cat${ac===c.id?" on":""}" data-c="${c.id}"><span class="ci">${c.i}</span>${c.l}<span class="cn">${cc(c.id)}</span></button>`).join("");

  // Section
  const sh=document.getElementById("sH");
  if(ac==="todos"){sh.classList.remove("vis")}else{
    const cat=C.find(x=>x.id===ac);
    sh.classList.add("vis");
    sh.querySelector(".ci").textContent=cat.i;
    sh.querySelector("h2").textContent=cat.l;
    sh.querySelector(".sc").textContent=cc(cat.id)+" pedidos";
  }

  // Filter
  const f=D.filter(r=>{
    if(ac!=="todos"&&!r.ct.includes(ac))return false;
    if(sq&&!r.t.toLowerCase().includes(sq.toLowerCase()))return false;
    if(sf==="pending"&&r.dn)return false;
    if(sf==="done"&&!r.dn)return false;
    return true;
  });

  const el=document.getElementById("lE");
  if(!f.length){el.innerHTML=`<div class="empty"><div class="ei">🙏</div><p>Nenhum pedido encontrado.</p></div>`;return}

  el.innerHTML=f.map(r=>{
    // First category icon for the circle
    const fc=C.find(x=>x.id===r.ct[0]);
    const icon=fc?fc.i:"🙏";
    // Category labels
    const clabels=r.ct.map(cid=>{const x=C.find(z=>z.id===cid);return x?x.l:""}).filter(Boolean).join(" · ");
    // Badges
    const bx=r.ct.map(cid=>{const x=C.find(z=>z.id===cid);if(!x)return"";return`<span class="bx" style="background:${x.c}10;color:${x.c};border:1px solid ${x.c}22">${x.i} ${x.l}</span>`}).join("");

    return`<div class="item${r.dn?" fin":""}" data-id="${r.id}">
      <div class="ic">${icon}</div>
      <div class="item-body">
        <div class="item-text">${r.t}</div>
        <div class="item-cats">${clabels}</div>
        <div class="item-detail">
          <div class="dg">
            <div class="di"><div class="di-l">Data</div><div class="di-v">${fd(r.dt)}</div></div>
            <div class="di"><div class="di-l">Status</div><div class="di-v ${r.dn?"dn":"act"}">${r.dn?"Finalizado":"Em oração"}</div></div>
            <div class="di"><div class="di-l">Nome</div><div class="di-v${r.cn?"":" em"}">${r.cn||"Não informado"}</div></div>
            <div class="di"><div class="di-l">Telefone</div><div class="di-v${r.cp?"":" em"}">${r.cp||"Não informado"}</div></div>
            <div class="di fw"><div class="di-l">E-mail</div><div class="di-v${r.ce?"":" em"}">${r.ce||"Não informado"}</div></div>
          </div>
          <div class="badges-exp">${bx}</div>
        </div>
      </div>
      <div class="item-right">
        <button class="chk${r.dn?" on":""}" data-ck="${r.id}" title="${r.dn?"Reabrir":"Finalizar"}">✓</button>
        <button class="dbtn" data-dl="${r.id}" title="Excluir">✕</button>
      </div>
    </div>`}).join("");
}
render();

// Events
document.getElementById("sI").addEventListener("input",e=>{sq=e.target.value;render()});
document.querySelector(".filters").addEventListener("click",e=>{const b=e.target.closest(".f-pill");if(!b)return;sf=b.dataset.f;document.querySelectorAll(".f-pill").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()});
document.getElementById("cR").addEventListener("click",e=>{const b=e.target.closest(".cat");if(!b)return;ac=b.dataset.c;render()});

document.getElementById("lE").addEventListener("click",e=>{
  const dl=e.target.closest("[data-dl]");
  if(dl){e.stopPropagation();oCf(+dl.dataset.dl);return}
  const ck=e.target.closest("[data-ck]");
  if(ck){e.stopPropagation();const r=D.find(x=>x.id===+ck.dataset.ck);if(r){r.dn=!r.dn;sv();render()}return}
  const it=e.target.closest(".item");
  if(it)it.classList.toggle("open");
});

// Add modal
const aO=document.getElementById("aO"),fC=document.getElementById("fC");
function oA(){
  fC.innerHTML=C.filter(c=>c.id!=="todos").map(c=>`<label class="cs-i" data-ci="${c.id}"><input type="checkbox" value="${c.id}"/>${c.i} ${c.l}</label>`).join("");
  document.getElementById("fD").value=new Date().toISOString().split("T")[0];
  ["fT","fN","fP","fE"].forEach(id=>document.getElementById(id).value="");
  aO.classList.add("open");
  setTimeout(()=>document.getElementById("fT").focus(),300);
}
function cA(){aO.classList.remove("open")}
fC.addEventListener("click",e=>{const l=e.target.closest(".cs-i");if(!l)return;const cb=l.querySelector("input");cb.checked=!cb.checked;l.classList.toggle("sel",cb.checked);e.preventDefault()});
document.getElementById("fab").addEventListener("click",oA);
document.getElementById("mX").addEventListener("click",cA);
aO.addEventListener("click",e=>{if(e.target===aO)cA()});
document.getElementById("aF").addEventListener("submit",e=>{
  e.preventDefault();
  const t=document.getElementById("fT").value.trim();
  const cats=Array.from(fC.querySelectorAll("input:checked")).map(c=>c.value);
  if(!t)return;if(!cats.length){alert("Selecione pelo menos uma categoria.");return}
  D.unshift({id:ni(),t,ct:cats,cn:document.getElementById("fN").value.trim()||null,cp:document.getElementById("fP").value.trim()||null,ce:document.getElementById("fE").value.trim()||null,dt:document.getElementById("fD").value||new Date().toISOString().split("T")[0],dn:false});
  sv();render();cA();
});

// Confirm
const cOv=document.getElementById("cO");
function oCf(id){di=id;const r=D.find(x=>x.id===id);document.getElementById("cPv").textContent=r?`"${r.t.substring(0,80)}${r.t.length>80?"...":""}"` :"";cOv.classList.add("open")}
function cCf(){di=null;cOv.classList.remove("open")}
document.getElementById("cC").addEventListener("click",cCf);
cOv.addEventListener("click",e=>{if(e.target===cOv)cCf()});
document.getElementById("cD").addEventListener("click",()=>{if(di!==null){D=D.filter(r=>r.id!==di);sv();render()}cCf()});
</script>
